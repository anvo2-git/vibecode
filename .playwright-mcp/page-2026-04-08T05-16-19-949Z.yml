                  - paragraph [ref=e4121]: This smells like shaving cream on me. It's very fresh and clean smelling but also masculine. People blast this stuff. I smell it everywhere and it's often overwhelming. I don't like it on my skin and I don't like smelling it on other people. It's not a bad smell. It doesn't make me gag or wince. But it can be suffocating. If I smell a fragrance on a man that is overdone, it is usually this one. A common offender by Uber/Lyft drivers. The ubiquity and over-spraying also makes me feel that men will wear this to cover up not showering, like an Axe body spray. It's not celebrated as a fragrance. It's treated like a chemical bath.
