                  - paragraph [ref=e2689]:
                    - text: I’ve tried more than 100 fragrances, both niche and designer, and Dior Sauvage EDT is definitely in my top 5. A lot of the hate it gets is undoubtedly caused mainly by its popularity. Don’t listen to people who say it smells like shower gel - I’d pay crazy money if I ever found a shower that smelled anything like this (no, the "Dior Sauvage shower gel" doesn’t count).
                    - text: It shares similarities with Dylan Blue and Invictus, but this is the best take on the DNA out of the three IMO. It just feels premium - those are the best bergamot and ambroxan notes I’ve smelled so far. The added woods and spices give it a sharp edge that reminds me of the smokiness of Aventus, layered with a sweet, ambery nuance.
                    - text: Please don’t listen to the hate - try it yourself first. I had bought Prada Luna Rossa and Sauvage Parfum before getting this, influenced by all the negativity around the EDT, but man… when I finally got Sauvage EDT, it’s crazy how good it smells. People love to hate things when they’re that good.
                    - text: Just go easy on the sprays - this thing can easily suffocate a room full of people hours after application, especially in high heat.
