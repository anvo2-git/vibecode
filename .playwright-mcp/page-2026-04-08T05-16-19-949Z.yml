                    - text: This scent is too common to be wearing anymore. You cannot be buying Dior Sauvage at this point in time.
                    - text: A victim of its own success, no one will tell you that you smell peppery, citrusy, woodsy, and instead, you simply smell like Dior Sauvage. The intricate play of the ambroxan and bergamont and cedar have dissolved into a cultural shorthand. Its ubiquiti ended up stripping it of its essence, once evoking, now merely identifies. A red flag whose scent no longer evokes curiosty or intrigue, but only a faint reminder of having smelled this somewhere, on someone else, at some point in time.
