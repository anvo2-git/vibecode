                  - paragraph [ref=e3455]:
                    - text: TLDR = Harsh opening almost makes it unwearable.
                    - text: The opening reminds me of Polo Green (1987 OG), but, even for an EDT, it is just too overwhelming for me to want to wear it again. The first 15 to 30 minutes are unpleasant, close to headache inducing. I think it might be related to the pepper note, or maybe just the strong, short-live pepper-citrus combination.
                    - text: After an hour or so, those harsh top notes fade away and reveal a much softer skin scent that seems nothing like the opening. So, yes, the scent evolves, but I'm not sure that is a good thing. The evolution of the scent is very much like Bleu de Chanel, except that I find BdC's to be the opposite -- BdC's opening, especially on paper, is alluring, but the skin scent, after drydown, is unpleasant, feminine and floral.
                    - text: I have samples of the Sauvage line and started with the EDT. I'm hoping the EDP or Parfum versions eliminate or reduce those opening notes and reveal a stronger base scent.
                    - text: I'm looking for a year round office scent and thought Sauvage might work. For me, the EDT is a no-go.
