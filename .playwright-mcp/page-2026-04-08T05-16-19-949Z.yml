                    - text: I got a 6.8oz from 2018, one of the first batches. It's the same strength as the current version. Do not worry about it being watered down
                    - text: My recommendation would be to just get club de nuit urban man elixir. It's close enough and you can avoid the high price tag by dior. I got this after buying urban man elixir and realized i wasted my money.
                    - text: As a review for this specifically, I like it a lot. 6 good full sprays gets you in the right spot for about 4 hours of longevity. It's not that loud like people say. It has about the same base materials as aventus with the ambroxan, iso e super, musk, and linalool/linalyl...and based on the formula i saw there's not really that much bergamot in it while aventus has a lot of bergamot.
