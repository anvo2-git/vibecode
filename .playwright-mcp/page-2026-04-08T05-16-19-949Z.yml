                  - paragraph [ref=e1749]:
                    - text: That beautiful perfume I once dreamed of and was overjoyed to try for the first time... I think I first tried it in a store in 2020. Now, years later, smelling it again, I notice something has changed. Of course, it couldn't be expected to protect itself from reformulation. And this probably wasn't its first reformulation. There's not much to say. A little spice overshadows everything at the opening, and after 1-2 hours, it continues to smell calmly, with cooled lavender and bergamot notes. Longevity might be slightly below average for a classic EDT. But this perfume is really expensive, my friend. Let's not even talk about the brand image.
