                  - paragraph [ref=e2487]:
                    - text: Certainly it's a very nice blue fragrance. Performance is monster for an edt. But everyone and their brother has it so it's unoriginal at this point
                    - text: Imo the edp is much much better. Deeper, richer, bluer, woodier, manlier, more mature
                    - text: The edt is loud and immature like a 21 year old at a dance club. The edp is sexy mature, and sophisticated, like a middle aged man at a whiskey bar. The parfum is pure elegance and luxury, like a billionaire at a yacht party
                    - text: Some might find the edt to be a bit boring
                    - text: I must have smelled a bad bottle of the elixer because the one I whiffed at the mall was just off
                    - text: Ultimately they're all good. The price on them is fairly egregious but I guess I understand it.. they're popular for a reason
                    - text: For a guy aged 16-22 go with the edt. For everyone else get the edp for daytime, office, and casual wear. Go with the parfum for date night. But really you can't go wrong with the edp or the parfum.. they're both amazing
                    - text: The edt is close in scent to the edp. But the edp just is more mature and has much more depth. The parfum is fairly different but has the same DNA for the most part. They're definitely all different enough to not be redundant. But they all smell "alike" more or less, meaning you can tell they're all Sauvages but they do different things
                    - text: The edt is youthful and in your face, the edp is classy, mature and sexy but doesn't put on airs, the parfum is sophisticated, luxurious and sexy but it puts on airs. It's hard to wear the parfum for most occasions. Easier to wear the edp, but it's more for intimate moments, the edt is the easiest to wear, but it's a bit immature. They all are sexy though don't get me wrong
                    - text: None of them are bad, just pricey as hell. They all perform beastly. The edp seems to perform the weakest actually. But for me the edp and the parfum are magical. Wish I could afford them!
