                  - paragraph [ref=e1507]:
                    - text: Sauvage is like an old friend. I rarely reach for it these days but will never get rid of it and when it runs out I will buy another bottle. It gets an outing every few months and I still get a lot of enjoyment from wearing Sauvage. I've been wearing it since about 2016. Back in the day it was THE fragrance for guys and had an allure that you rarely see matched by anything these days. It took the blue trend fragrance was experiencing and took it in a spicer, edgier and more complicated direction. Sauvage, along with Bleu de Chanel, pretty much signalled the end of the Aquatic epoch for mainstream fragrance and can legitimately claim to be a cultural phenomenon in its own right, going above "mere" perfumery. Along with Baccarat 540, it heralded the beginning of the "Ambroxin Era" and nothing was ever quite the same again for any of us after that, was it?
                    - text: So, ten years later, although Sauvage's star is unarguably on the wane, it does still wear very well and is still a legitimately great choice. It has aged better than I think a lot of people thought it would. It has certainly aged better than I have in the last ten years. It is linear but does last incredibly long for an EDT concentration.
                    - text: We know the fragrance profile intimately by now and so it serves little purpose to go back through the notes and so on, but for me, the star of the show here and what makes Sauvage still wearable and still enjoyable even after all this time, is the pepper and the patchouli. It's blue Jim, but not as we know it. Believe it or not, I've actually never got my nose on the Elixir concentration of Sauvage as there is a part of me that thinks perfection should be left alone and that some things should be allowed to age gracefully. Sauvage has always felt just right for me and I cannot for the life of me see how a flanker concentration could or would improve this.
                    - text: I rarely wear it now because it isn't interesting really and I've got over a hundred bottles of fragrances so its utility is always going to be limited to times when I want to feel retrospective. The traumatic first half of the last ten years were the worst of my life and there is a lot about that period that I do not ever wish to reach for or be reminded of, which I guess is another reason why. But as I said earlier, I will always have a place in my collection for Sauvage. It is the fragrance equivalent of holding onto old photographs or having that iTunes playlist from way back in the day. I still have a little bottle of CKOne for the same reason. Not to wear (I haven't for many, many years now) but to smell and be reminded of simpler but no less intense times in a world very much different and somehow more innocent than the one we live in now.
                    - text: "Three Word Summary: Never Been Rumbled"
                    - text: Scent - 8/10
                    - text: Sillage - 8/10
                    - text: Drydown - 6/10
                    - text: Bottle/packaging - 8/10
                    - text: Performance - 8/10
                    - text: 38/50
