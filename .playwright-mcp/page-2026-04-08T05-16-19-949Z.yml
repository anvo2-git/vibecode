                  - paragraph [ref=e3399]:
                    - text: Loud, sharp, and impossible to ignore, regardless of whether or not you want to.
                    - text: "Personal: 5.5/10 – I don’t enjoy wearing this. It's aggressively fresh spicy, practically piercing, and overly synthetic. Yes, I understand why it works, but even Sauvage EDP is too much for me."
                    - text: "Mass appeal: 9/10 – This is one of the most universally recognized and liked masculine fragrances of the last decade. People love this stuff. Marked down due to negative associations by many."
                    - text: "Performance: 8/10 – Strong projection and longevity. It announces itself immediately and sticks around for a long time, despite being the EDT. Lasts forever on clothes."
                    - text: "Value: 7/10 – A bit expensive, but you’re paying for performance, recognition, and brand power."
                    - text: "Uniqueness: 3/10 – It was influential, groundbreaking even, when it launched, but now its DNA is everywhere. At this point, it feels generic. I'll even go a step further, it isn't just generic, it's the new floor for generic."
                    - text: "SCORE: 65/100"
                    - text: Full bottle buy? NO, I have no desire to smell like this regularly. I have the EDP which I haven't worn in well over a year.
                    - text: Blind buy? YES, statistically safe, even if I personally wouldn’t recommend it.
                    - text: Recommend? YES, begrudgingly... It works, whether I like it or not.
                    - text: Date night? YES, mass appealing and confident, but not subtle. Make sure she didn't have an ex that wore this though, and do me a favor, try not to be the ex of hers that *did* wear it.
                    - text: Office safe? NO, too loud and sharp unless used very sparingly, but even then you're pushing it.
                    - text: "Pros: Extremely mass appealing, powerful performance, instantly recognizable"
                    - text: "Cons: Overused, sharp and synthetic, loud to the point of annoyance, lacks nuance"
                    - text: Sauvage EDT is the only fragrance I'm going to review that I genuinely will not describe in the review. You already know *exactly* what this smells like, and at this point, it's no secret that I don't like it, and I'm willing to bet you don't either. It's a sad story of how a fragrance was killed by its very own success, and I blame it for a lot of the modern distaste towards ambroxan and fresh spiciness in general, as even hints of sichuan pepper can trigger PTSD in those with spotted relationship history.
                    - text: Sauvage EDT isn’t objectively bad. It’s just loud, ubiquitous, and no longer aligned with what I want to smell like, and for that matter, what most people want to smell like. It’s a benchmark, a juggernaut, and a relic of a very specific moment in fragrance history, and a candle that burnt twice as bright, but definitely not half as long.
                    - text: "Additional side note: This is our generation's Drakkar Noir."
                    - text: "Review #177 in my fragrance journey – this fragrance I own as a decant"
