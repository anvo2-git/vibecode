                  - paragraph [ref=e1471]:
                    - text: Well, I don’t even know what to start with. I think that all opinions about this fragrance have been already said, and this review is more for myself, rather than the community
                    - text: "First of all, let’s all agree that it’s the legend. I believe 99% of people will remember only two fragrance ads: 1 million, and the one with Johnny Depp who was dying hot while building the whole identity for this masterpiece. Ask a guy to name a women’s fragrance, and he would say Chanel num.5. Ask a girl to name a men’s fragrance and… You know the answer"
                    - text: "The composition itself is pretty simple: bergamot that is half sweet, half sour, tons of pepper, famous ambroxan - all of artisan quality. This is the most generic composition of a blue fragrance. I believe the sauvage is the one who is responsible for the hype of citrus, especially bergamot, and pepper profiles that I love so much. I mean, we all love them so much"
                    - text: The performance is great for an EDT, and stays easily on the skin for 7-8 hours, and 3 to 4 hours being loud “HEY, YALL, I’M HERE”
                    - text: "By the way, so amusing to watch women’s reactions on this one:"
                    - text: "- Oh, I love this smell. It’s sooo good"
                    - text: "- Glad you enjoyed it! It’s Dior sauvage"
                    - text: "- OH, HELL NO! My ex had sauvage and I hate him!!!"
                    - text: Girl, just admit that the fragrance didn’t become worse due to your bad boy ex, that you likely still in love with
                    - text: It can’t be offensive, but it’s daring and bold. It’s fresh and clean, but sharp and masculine. It’s daily, casual, night, date, clubbing, winter, spring, summer, fall. It’s that one fragrance that you’ll grab in a rush, and the one you’ll take your time to apply it and appreciate the composition. It’s THE fragrance
                    - text: I don’t know what to say here. Sauvage can be dull, boring, common, but I don’t know any single person who thinks that it’s bad. It’s the victim of its own perfection. Sauvage is so effective at its job that it became a white noise of any big town. The most gorgeous white noise…
