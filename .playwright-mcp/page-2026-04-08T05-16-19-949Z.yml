                  - paragraph [ref=e1315]:
                    - text: Living proof that scent association is a thing. Let me set the stage for my encounter with Dior Sauvage EDT.
                    - text: I bought it. Thought it was a “sexy” smell. I wore a few times.
                    - text: One night, I went with a friend to a concert. I wore Initio ND that night testing. Standing at the back of the crowd, I suddenly was hit with a blast of Dior EDT. In looked around and immediately found the source. I’m not going to call out what I saw specifically. Let’s just say, I suddenly realized Dior wasn’t for me any longer. Sold it the next day and happy to be rid of it 🤣
                    - text: Look, it’s a club scent. If that’s what you are going for, more power to you, by all means. It is NOT a safe comfort scent by any means.
