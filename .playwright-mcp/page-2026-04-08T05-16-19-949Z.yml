                  - paragraph [ref=e2803]:
                    - text: As for the parfum, I can see why this is a very popular perfume. It's dense and powerful yet supple like a strong hug (from someone you don't really want a hug from). The bergamot and orange sit very precisely at the top while the heart and base swirl in waves of sandalwood, olibanum, and vanilla. Sweet yet fresh, woody yet springy. This parfum version of Sauvage is tolerable, for the most part; the harsh, sharp, and thick edges present in the EdP and EdT have been decently rounded out and softened, but it's by no means interesting or "good."
                    - text: Whereas the parfum of Sauvage was tolerable, mostly, the EdP is not. It's a sloppy mess of synthetics all blended to the same decibel level. Piquant, nose tingling, synthetic citruses; thick, oily, resinous, synthetic sandalwood and cedar; melted, syrupy, sweet amber and a big heaping spoonful of musk. It's lifeless - never evolving or playing with the air around it. Thick, like you're trying to breath in soup. Unpleasant, but oh so popular.
                    - text: And for the EdT, this is basically the same as the EdP except made a bit more effervescent and short lived. The ambers and woods do not feature as prominently, and their longevity is quite a bit shorter (thankfully).
                    - text: "So, with all of that this said: no. All three are total scrubbers and do not deserve any sort of connection to the Roudnitska masterpiece that is Eau Sauvage."
