                  - paragraph [ref=e2285]:
                    - text: Dior Sauvage in 2026.
                    - text: As you grow your collection, you may find that what you once wore often is now collecting dust. This comes naturally with fragrance collecting, it wasn't until you gained experience with new scents that you realized there are "better" scents out there.
                    - text: ...In other instances, some fragrances not only stand the test of time, but the test of trying new things.
                    - text: "Dior Sauvage was destined to be a king of many categories from Day One: After hundreds of bottles, nothing seems to share the same scent profile or vibe as Sauvage for me. This is peppery ambroxan amplified to make sure everyone knows you're wearing it, with just enough depth & undertones of citrus & vetiver to satisfy a select number of fragrance enthusiasts, who have finally decided that bashing this scent for its popularity and polarizing opening is no longer \"cool\" or \"unique\"."
                    - text: While I understand that there are hundreds of fragrances out there since its release that are smoother, easier to wear, and maybe even more enjoyable, I also like the experience of wearing this. I also understand that I do not live in a bubble, and to know that not only my partner loves this on me, but others do, is many a reason to keep wearing this years later.
                    - text: Two sprays were all I need to last the day. Anything more and I either go nose-blind to it or I feel like I'm suffocating the person next to me with the projection.
                    - text: I would argue that Sauvage may not be a must-own, but a must-try scent on your fragrance collecting journey. I'm sure this was many peoples' first fragrance that began their collecting journey, and if Sauvage's popularity is what inspired many to wear fragrances, then Francois Demachy deserves a lot of credit for creating something so controversial, yet popular and unforgettable in Fragrance Culture.
                    - text: And to the reviewers that suggest you will "smell like everyone else" with Sauvage, I must say that I hardly pick up scents on anyone in public, I think 99% of people don't wear fragrances regularly anyway.
                    - text: "TLDR: Strong pepper ambroxan opening with vetiver undertones, all-day projection. Worth the price, especially on discounters."
                    - text: 8.9/10
