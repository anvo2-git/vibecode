                  - paragraph [ref=e3231]:
                    - text: I can't fully judge this scent on its own objective merits because the well has been forever poisoned by the fact that it smells almost identical to Lynx body spray. I believe for those in the States, the equivalent is Axe. Dior Sauvage smells like a slightly elevated tacky Lynx deodorant, and from what I gather this isn't that much of a hot take.
                    - text: Because it shares its profile with Lynx, all it does is take me back to my time in high school where you'd enter the changing room before and after P.E. and just be hit by this absolute hotboxxing of that infamously (or infamous for me anyhow) sharp scent. (the fresh spicy aspect with the citrus, I believe?) This partly just came down to each individual lad using just a bit too much spray, which then adds up into a mass of overwhelming chemical overdose. But even on top of that, the most obnoxious, 'popular'-type guys would literally, no joke, spray themselves ALL over their body for what felt like up to 30 seconds. It was downright hazardous.
                    - text: All that preamble is just to ensure the context is understood that all I can do is associate this particular scent with the horrible feeling of being suffocated by it, and then by proxy also associate it with the ill-adjusted sorts who overapplied it. That aside though, I never had any inclination of enjoying the scent to begin with. It's just not my thing; for me, it really does just hit like a sharp chemical that isn't welcome up my nose.
                    - text: And even memory aside, fragrances should really feel quite luxurious and pampering, no? Even without my horrid overexposure, just knowing that it's the scent of a cheap deodorant kinda immediately nullifies the experience. That of course is more the fault of association than the scent itself technically, but the final result is a feeling of cheap, chemical bleghhhhh nonetheless. I'm just glad I got to confirm my distaste via a free sample.
