                    - text: I've known of the Sauvage line way before I got into Perfumes. Even after getting into the hobby of collecting Fragrances, I never went and bought Sauvage for myself. In fact, my first purchase in the line was Dior Sauvage Elixir, shocking i know.
                    - text: It was from that initial purchase I made at the start of University that my love the the Sauvage Line grew, and then I got the Eau De Parfum, which is my favourite out of the entire line. It was my girlfriend who bought the EdT for valentines day. She loves the entire line.
                    - text: Compared to the other in the line this one is by far the most popular (as you all know) and the one that gets the most hate for being overused, smelling like their ex and everyone and their uncle owns this perfume. Which whoever says that is clearly making it up. Is it well known? Yes. Because its a fantastic blue scent that is so versatile that I cant think of a reason why you could not wear it. In my years of collecting perfume, I can count on my hand how many times i have only smelt Sauvage EdT on other people or in the air. A lot of people dont wear Perfumes, and if they do its not usually this one.
                    - text: Let's get into the notes and breakdown. It opens with a burst of citrus, giving it a clean and juicy initial scent. Then comes in the peppery spice, which adds a lively warmth the the fragrance, before it leans into the aromatic, herby elements. Then finishing itself off with the warm musky trail that lingers on yourself and your clothes. With the cedar rounding of this ambroxan goodness.
                    - text: Versatility is 10/10, can be worn anywhere for any occasion. Length wise, a solid 8/10(the older batches last a lot longer than the newer ones). 7/10 for the price, consistently sells well enough to warrant how pricey it is.
