                    - text: Sampled and wore it until it was gone. Insane how much this smells like Sprite on initial application. I think the ambroxan in the opening is what makes it smell effervescent, really fizzy like the soda... The whole opening on my skin is a like Michelin-star Sprite... like I mean it smells different in a good way, like they remade Sprite from quality ingredients from scratch... It's freshly made so it's cold and really fizzing and sizzling bubbling and stuff, and there's also like two mint leaves floating on the top. That's the opening. Instantly hooked me, it's really good.
                    - text: Drydown is nice. As it settles it’s very much mint leaf, like holding and crushing a handful of them in your palm, and there’s definetly black pepper, giving it an edge, a lil good harshness and bite to it. The fizzing calms down completely at this point, it's basically gone... really like the soda settling after being poured Lol.
                    - text: Mint leaves, flat Sprite, pepper Yup that's Sauvage. It’s popular for a reason! Really solid frag. I like it.
                    - text: Also I always see people arguing about this so As a girl, yeah I think it’s fine. Good, even! I likeee it and It's interesting. I wouldn't really call it "sexy", but it's not unattractive in the slightest. I’d recommend/gift it to my boyfriend, and not just because he loves Sprite!
                    - text: Actually I would wear this too on the regular. It's a masc-leaning unisex to me. I'm deadass it would be a good office scent for me if it didn't have its contemporary connotations. I guess I like it because clean fresh frags are my thing. I mean I'd wear it if I had it but I don't think I would buy it? Can't say I wont lol.
                    - text: At the very least it's redeemed pepper in fragrances for me.
