                  - paragraph [ref=e4153]:
                    - text: I hate to admit it, but @redriverronin is right. Let me spin you the horrific and sorrowful tale of the upbringing that turned a beautiful lil 'upper-middle class' chip off the old block into an incel straight out of Betrand Bonello's critically-acclaimed 2023 film "The Beast."
                    - text: I grew up in a suburb whose houses were inhabited by domestic violence lite, existential angst, and exorbitant Christmas gifts. I was a good little guy who played soccer and loved music, but unfortunately my Radiohead mixtapes would keep all the hot girls away, and so I developed a deep and burning hatred for all humans without a Y chromosome. And yes...that was the question I found myself asking myself. Y? I would ask. Y don't I have my beautiful love story with the demigodess of me dreams? It went beyond the fact that many girls lack the IQ to understand that Thom Yorke's whiny voice is annoying on purpose; it builds character, even if that character turns out to be an incel in the great Novel called Life. No - girls didn't like me because I was not wearing Sauvage by Dior.
                    - text: So I went along my merry way accruing generational trauma and Pokemon Cards. I bought my first perfume - Mambo by Liz Claibourne - and all that got me was a few year-or-so relationships with girls in my league. I learned life lessons, how to communicate, and valuable pieces of information like the fact that people can have their own opinions. But did this get me the girl of my dreams? No. They just got me a bunch of other girls that I would eventually break up with or be broken up with by (beautiful phrasing, I know.) Needless to say, I felt shafted. Life was the joke and I was the question mark at the end of the joke and the punchline was something hilarious that Life was keeping from me.
                    - text: One day, I befriended a trans man (against all odds because, as I said before, no Y chromosome) and he gifted me a bottle of Sauvage because it reminded him of his ex too much. I sprayed it. It was fine. I gave it away because I liked Bleu de Chanel way better and found Sauvage really boring despite its universal appeal. To many, Sauvage may be like that wonderful Marvel movie where inspiring heroes with rich lore are embodied by talented, charismatic actors and battle each other in fantastical worlds for the future of the universe. To me, Sauvage is like that badly-plotted, greenscreen-heavy Marvel movie founded by a megacorporation that sands down its products until all semblances of personality are gone.
                    - text: Now I am engaged to a beautiful woman who thinks Sauvage is as mid as I do, and I can't wait for us to be Married Incels together.
